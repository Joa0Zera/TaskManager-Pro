<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - TaskManager Pro</title>
  <script>!function(){var t=localStorage.getItem('taskmanager-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}();</script>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/premium.css">
</head>
<body class="dashboard-app">
  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual-content">
        <div class="auth-visual-icon">✓</div>
        <h2>Comece agora</h2>
        <p>Crie sua conta gratuita e tenha acesso a todas as ferramentas de produtividade do TaskManager Pro.</p>
        <div class="auth-visual-features">
          <div class="auth-feature">
            <span class="auth-feature-icon">✅</span>
            <span>CRUD completo de tarefas</span>
          </div>
          <div class="auth-feature">
            <span class="auth-feature-icon">🎯</span>
            <span>Prioridades e categorias</span>
          </div>
          <div class="auth-feature">
            <span class="auth-feature-icon">📊</span>
            <span>Métricas de produtividade</span>
          </div>
        </div>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-container glass">
        <button type="button" class="theme-toggle auth-theme-toggle" id="themeToggle" aria-label="Alternar tema"></button>
        <a href="index.html" class="back-link">← Voltar ao início</a>
        <div class="auth-form-header">
          <h1>Criar conta</h1>
          <p>Preencha os dados para começar</p>
        </div>

        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" placeholder="Seu nome completo" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <div class="password-toggle">
              <input type="password" id="senha" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
              <button type="button" class="password-toggle-btn" aria-label="Mostrar senha">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmarSenha">Confirmar senha</label>
            <div class="password-toggle">
              <input type="password" id="confirmarSenha" name="confirmarSenha" class="form-control" placeholder="Repita a senha" required>
              <button type="button" class="password-toggle-btn" aria-label="Mostrar senha">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Criar conta</button>
        </form>

        <div class="auth-form-footer">
          <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{UI.init();ThemeManager.init();});</script>
</body>
</html>
